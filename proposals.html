<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>김한결 — 포트폴리오 디자인 시안 (3종)</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<style>
:root{
  --bg:#ffffff; --paper:#f7f6f3; --ink:#17140f; --ink2:#5c564c; --faint:#a39c90;
  --line:#ece9e3; --line2:#ddd9d1; --accent:#ff6f0f; --accentink:#e85d00;
  --mono:"SFMono-Regular",ui-monospace,Menlo,Consolas,monospace;
  --maxw:1180px; --ease:cubic-bezier(.22,.61,.18,1);
  --san:"Pretendard Variable",Pretendard,-apple-system,system-ui,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--paper);color:var(--ink);font-family:var(--san);line-height:1.6;letter-spacing:-.012em;-webkit-font-smoothing:antialiased}
::selection{background:var(--accent);color:#fff}
a{color:inherit;text-decoration:none}
img,video{display:block;max-width:100%}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer}

/* ---------- TOPBAR (proposal switcher) ---------- */
#topbar{position:sticky;top:0;z-index:60;background:rgba(255,255,255,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
#topbar .in{max-width:1320px;margin:0 auto;padding:0 22px;height:58px;display:flex;align-items:center;gap:18px}
#topbar .brand{font-weight:800;font-size:14px;letter-spacing:-.02em;display:flex;gap:8px;align-items:center}
#topbar .brand i{width:7px;height:7px;border-radius:50%;background:var(--accent);display:inline-block}
.tabs{display:flex;gap:4px;margin-left:6px;background:var(--paper);border:1px solid var(--line);border-radius:100px;padding:4px}
.tabs button{border:0;background:none;font-size:13px;color:var(--ink2);padding:7px 15px;border-radius:100px;transition:.2s;font-weight:600}
.tabs button.on{background:var(--ink);color:#fff}
#topbar .right{margin-left:auto;display:flex;gap:8px;align-items:center}
.tbtn{font-size:12.5px;border:1px solid var(--line2);background:#fff;color:var(--ink2);padding:8px 14px;border-radius:100px;transition:.2s;font-weight:600;display:flex;gap:7px;align-items:center}
.tbtn:hover{border-color:var(--ink);color:var(--ink)}
.tbtn.act{background:var(--accent);border-color:var(--accent);color:#fff}
.vlabel{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.04em}
@media(max-width:680px){#topbar .vlabel,#topbar .brand small{display:none}.tbtn .t{display:none}}

#stage{max-width:100%;overflow:hidden}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 22px}
.ey{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accentink)}
.muted{color:var(--ink2)}

/* ---------- SHARED: work media ---------- */
.media{position:relative;overflow:hidden;background:#eceae5}
.media>img{width:100%;display:block;aspect-ratio:9/16;object-fit:cover}
.media>video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.catpill{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);border:1px solid var(--line2);border-radius:100px;padding:4px 9px;background:#fff}

/* ===========================================================
   VARIANT A — MONO INDEX  (typographic, numbered list)
   =========================================================== */
[data-v="a"] #stage{background:#fff}
.a-hero{padding:clamp(70px,13vh,150px) 0 clamp(40px,7vh,80px)}
.a-hero .top{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap;border-bottom:1px solid var(--ink);padding-bottom:22px}
.a-hero h1{font-weight:860;letter-spacing:-.045em;line-height:.92;font-size:clamp(2.8rem,9vw,7.5rem)}
.a-hero h1 .o{color:var(--accent)}
.a-hero .meta{font-family:var(--mono);font-size:12px;color:var(--ink2);text-align:right;line-height:1.9;white-space:nowrap}
.a-hero .lead{margin-top:26px;max-width:50ch;font-size:clamp(15px,1.7vw,18px);color:var(--ink2)}
.a-sec-l{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);padding:30px 0 6px;border-top:1px solid var(--line);display:flex;justify-content:space-between}
.idxlist{border-top:1px solid var(--ink)}
.idxrow{display:grid;grid-template-columns:46px 1fr auto auto;gap:18px;align-items:center;padding:20px 4px;border-bottom:1px solid var(--line);cursor:pointer;transition:.25s var(--ease);position:relative}
.idxrow:hover{padding-left:14px;background:linear-gradient(90deg,rgba(255,111,15,.05),transparent 60%)}
.idxrow .no{font-family:var(--mono);font-size:13px;color:var(--faint)}
.idxrow:hover .no{color:var(--accent)}
.idxrow .ti{font-weight:750;font-size:clamp(18px,2.4vw,27px);letter-spacing:-.025em;line-height:1.15}
.idxrow .ti small{display:block;font-weight:500;font-size:13px;color:var(--ink2);margin-top:3px;letter-spacing:0}
.idxrow .ca{font-family:var(--mono);font-size:11px;color:var(--ink2);text-transform:uppercase;letter-spacing:.08em}
.idxrow .yr{font-family:var(--mono);font-size:12px;color:var(--faint)}
.idxrow .arr{font-size:18px;color:var(--faint);transition:.25s}
.idxrow:hover .arr{color:var(--accent);transform:translateX(4px)}
#hoverprev{position:fixed;width:200px;aspect-ratio:9/16;border-radius:10px;overflow:hidden;pointer-events:none;z-index:40;opacity:0;transform:translate(-50%,-50%) scale(.92);transition:opacity .25s,transform .25s;box-shadow:0 24px 60px -20px rgba(0,0,0,.35);border:3px solid #fff}
#hoverprev.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
#hoverprev video{width:100%;height:100%;object-fit:cover}
@media(max-width:760px){.idxrow{grid-template-columns:34px 1fr;gap:12px}.idxrow .ca,.idxrow .yr,.idxrow .arr{display:none}#hoverprev{display:none}}

/* ===========================================================
   VARIANT B — SOFT GALLERY (card grid)
   =========================================================== */
[data-v="b"] #stage{background:var(--paper)}
.b-hero{padding:clamp(64px,12vh,130px) 0 30px;text-align:center}
.b-hero h1{font-weight:840;letter-spacing:-.04em;line-height:1.0;font-size:clamp(2.4rem,6.4vw,5.2rem)}
.b-hero h1 .o{color:var(--accent)}
.b-hero .lead{margin:20px auto 0;max-width:54ch;color:var(--ink2);font-size:clamp(15px,1.7vw,18px)}
.b-fil{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:34px 0 8px}
.b-fil button{font-size:13px;border:1px solid var(--line2);background:#fff;color:var(--ink2);padding:9px 17px;border-radius:100px;font-weight:600;transition:.2s}
.b-fil button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.b-grid{columns:3;column-gap:20px;padding:24px 0 30px}
@media(max-width:980px){.b-grid{columns:2}}
@media(max-width:600px){.b-grid{columns:1}}
.bcard{break-inside:avoid;margin-bottom:20px;border-radius:16px;overflow:hidden;background:#fff;border:1px solid var(--line);cursor:pointer;transition:transform .45s var(--ease),box-shadow .45s}
.bcard:hover{transform:translateY(-5px);box-shadow:0 26px 50px -28px rgba(0,0,0,.28)}
.bcard .media>img{aspect-ratio:auto}
.bcard .cap{padding:15px 17px 17px}
.bcard .cap .ti{font-weight:740;font-size:16.5px;letter-spacing:-.02em}
.bcard .cap .ro{font-size:12.5px;color:var(--ink2);margin-top:4px}
.bcard .cap .tp{margin-top:11px;display:flex;gap:6px;flex-wrap:wrap}
.bcard .cap .tp span{font-family:var(--mono);font-size:10.5px;color:var(--ink2);border:1px solid var(--line);border-radius:6px;padding:3px 8px}

/* ===========================================================
   VARIANT C — RESUME-TRUE (document, leads with profile)
   =========================================================== */
[data-v="c"] #stage{background:#fff}
.c-top{padding:clamp(40px,7vh,80px) 0 0}
.c-kicker{display:flex;justify-content:space-between;align-items:baseline;border-bottom:2px solid var(--ink);padding-bottom:14px;flex-wrap:wrap;gap:10px}
.c-kicker h1{font-weight:840;letter-spacing:-.03em;font-size:clamp(1.7rem,3.4vw,2.6rem)}
.c-kicker .r{font-family:var(--mono);font-size:12px;color:var(--ink2);text-align:right;line-height:1.8}
.c-worklist{padding:30px 0 40px}
.c-wrow{display:grid;grid-template-columns:1.2fr 1.8fr;gap:clamp(20px,4vw,48px);padding:26px 0;border-bottom:1px solid var(--line);align-items:center}
.c-wrow .media{border-radius:12px;border:1px solid var(--line)}
.c-wrow .media>img{aspect-ratio:16/11}
.c-wrow.port .media{max-width:300px}.c-wrow.port .media>img{aspect-ratio:9/16}
.c-wrow .no{font-family:var(--mono);font-size:12px;color:var(--accent)}
.c-wrow h3{font-weight:800;letter-spacing:-.025em;font-size:clamp(1.3rem,2.4vw,1.9rem);margin-top:8px}
.c-wrow .ro{color:var(--ink2);font-size:14px;margin-top:8px;font-weight:600}
.c-wrow .de{color:var(--ink2);font-size:14.5px;margin-top:10px;max-width:46ch}
.c-wrow .tp{margin-top:14px;display:flex;gap:7px;flex-wrap:wrap}
.c-wrow .tp span{font-family:var(--mono);font-size:11px;color:var(--ink2);border:1px solid var(--line);border-radius:7px;padding:4px 9px}
@media(max-width:760px){.c-wrow{grid-template-columns:1fr}.c-wrow.port .media{max-width:none}}

/* ---------- ABOUT (Figma resume structure) — shared, styled per variant ---------- */
.about{padding:clamp(54px,9vh,100px) 0 30px}
.ab-tag{font-weight:820;letter-spacing:-.03em;font-size:clamp(1.5rem,3.4vw,2.5rem);line-height:1.25;max-width:22ch}
.ab-tag .o{color:var(--accent)}
.ab-grid{display:grid;grid-template-columns:0.92fr 1.08fr;gap:clamp(28px,5vw,64px);margin-top:34px;align-items:start}
@media(max-width:840px){.ab-grid{grid-template-columns:1fr;gap:34px}}
.ab-id{display:flex;gap:18px;align-items:flex-start}
.ab-photo{width:104px;height:128px;border-radius:12px;background:linear-gradient(160deg,#f0eee9,#e3e0d9);border:1px solid var(--line2);flex:none;display:grid;place-items:center;color:var(--faint);font-family:var(--mono);font-size:10px;text-align:center;overflow:hidden}
.ab-photo img{width:100%;height:100%;object-fit:cover}
.ab-info{font-size:13.5px}
.ab-info .row{display:flex;gap:10px;padding:5px 0;border-bottom:1px dashed var(--line);align-items:baseline}
.ab-info .row:last-child{border-bottom:0}
.ab-info .k{font-family:var(--mono);font-size:11px;color:var(--faint);min-width:54px}
.ab-info .v{color:var(--ink)}
.ab-desc{margin-top:22px;color:var(--ink2);font-size:15px;max-width:50ch}
.ab-comp{margin-top:20px;display:flex;flex-direction:column;gap:9px}
.ab-comp .c{display:flex;gap:12px;align-items:baseline}
.ab-comp .lab{font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:#fff;background:var(--ink);border-radius:5px;padding:4px 8px;white-space:nowrap}
.ab-comp .tx{font-size:13.5px;color:var(--ink)}
.ab-block{margin-bottom:26px}
.ab-block h5{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accentink);border-bottom:1px solid var(--ink);padding-bottom:7px;margin-bottom:6px;display:flex;justify-content:space-between}
.ab-row{display:flex;gap:14px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.ab-row:last-child{border-bottom:0}
.ab-row .yr{font-family:var(--mono);font-size:11.5px;color:var(--faint);min-width:96px;white-space:nowrap}
.ab-row .bd b{font-weight:700}.ab-row .bd small{display:block;color:var(--ink2);font-size:12px;margin-top:2px}
.ab-skill{display:flex;gap:10px;padding:7px 0;flex-wrap:wrap;align-items:baseline;border-bottom:1px solid var(--line)}
.ab-skill .k{font-family:var(--mono);font-size:11px;color:var(--faint);min-width:34px}
.ab-skill .v{display:flex;flex-wrap:wrap;gap:6px}
.ab-skill .v span{font-size:12px;border:1px solid var(--line2);border-radius:6px;padding:3px 8px;color:var(--ink)}
.awtable{columns:2;column-gap:30px}
@media(max-width:620px){.awtable{columns:1}}
.awrow{break-inside:avoid;display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
.awrow .pz{font-weight:800;color:var(--accentink);min-width:50px;white-space:nowrap;font-size:12.5px}
.awrow .d small{display:block;color:var(--ink2);font-size:11.5px;margin-top:2px}

/* ---------- FOOTER ---------- */
.pfoot{border-top:1px solid var(--line);padding:40px 0 70px;color:var(--faint);font-family:var(--mono);font-size:12px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}

/* ---------- LIGHTBOX ---------- */
#lb{position:fixed;inset:0;z-index:80;background:rgba(247,246,243,.92);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:24px}
#lb.on{display:flex}
#lb .bx{display:grid;grid-template-columns:auto 320px;gap:28px;max-width:1080px;width:100%;align-items:center}
#lb video{max-height:84vh;border-radius:12px;border:1px solid var(--line2);background:#000}
#lb .meta h3{font-weight:820;font-size:clamp(1.3rem,2.6vw,2rem);letter-spacing:-.02em}
#lb .meta .ro{color:var(--accentink);font-weight:600;margin-top:10px;font-size:14px}
#lb .meta .de{color:var(--ink2);margin-top:14px;font-size:15px}
#lb .x{position:fixed;top:18px;right:22px;width:42px;height:42px;border-radius:50%;border:1px solid var(--line2);background:#fff;font-size:18px;display:grid;place-items:center}
@media(max-width:780px){#lb .bx{grid-template-columns:1fr}#lb video{max-height:56vh}}

/* ---------- EDITOR ---------- */
#edit{position:fixed;top:0;right:0;bottom:0;width:340px;max-width:90vw;background:#fff;border-left:1px solid var(--line2);z-index:90;transform:translateX(100%);transition:.35s var(--ease);box-shadow:-20px 0 50px -30px rgba(0,0,0,.3);display:flex;flex-direction:column}
#edit.on{transform:none}
#edit .hd{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
#edit .hd b{font-size:14px}#edit .hd .cl{border:0;background:none;font-size:18px;color:var(--ink2)}
#edit .bd{overflow:auto;padding:12px 14px;flex:1}
#edit .hint{font-size:11.5px;color:var(--ink2);background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-bottom:12px;line-height:1.5}
.eitem{border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:9px;background:#fff;transition:.2s}
.eitem.drag{opacity:.4}.eitem.hidden{opacity:.5;background:var(--paper)}
.eitem .top{display:flex;gap:8px;align-items:center}
.eitem .grip{cursor:grab;color:var(--faint);font-size:15px;padding:2px 4px}
.eitem .nm{font-weight:700;font-size:13px;flex:1;outline:none}
.eitem .nm:focus{color:var(--accentink)}
.eitem .mini{font-family:var(--mono);font-size:10px;color:var(--faint)}
.eitem .actions{display:flex;gap:6px;margin-top:8px}
.eitem .actions button{font-size:11px;border:1px solid var(--line2);background:#fff;color:var(--ink2);border-radius:7px;padding:5px 8px}
.eitem .actions button:hover{border-color:var(--ink);color:var(--ink)}
#edit .ft{padding:12px 14px;border-top:1px solid var(--line);display:flex;gap:8px}
#edit .ft button{flex:1;border:1px solid var(--line2);background:#fff;padding:10px;border-radius:9px;font-weight:600;font-size:12.5px}
#edit .ft .exp{background:var(--ink);color:#fff;border-color:var(--ink)}
.editmode .idxrow,.editmode .bcard,.editmode .c-wrow{outline:1px dashed transparent}

/* ---- RESUME (balanced, improved) ---- */
.about .ey{display:block}
.rh{display:grid;grid-template-columns:142px 1fr;gap:clamp(20px,4vw,46px);align-items:center;margin-top:16px;padding-bottom:28px;border-bottom:1px solid var(--line)}
.rh-photo{width:142px;height:178px;border-radius:14px;overflow:hidden;background:#eceae5;border:1px solid var(--line2);flex:none}
.rh-photo img{width:100%;height:100%;object-fit:cover;display:block}
.rh-name{font-weight:850;font-size:clamp(1.4rem,3vw,2.1rem);letter-spacing:-.03em}
.rh-name span{font-family:var(--mono);font-size:12px;color:var(--faint);font-weight:500;margin-left:9px;letter-spacing:.12em}
.rh-main .ab-tag{font-size:clamp(1.05rem,2vw,1.5rem);line-height:1.32;margin-top:8px;max-width:30ch;font-weight:750}
.rh-desc{margin-top:13px;color:var(--ink2);font-size:14.5px;max-width:60ch}
.rh-meta{margin-top:16px;display:flex;flex-wrap:wrap;gap:9px 20px}
.ab-meta{font-size:13px;color:var(--ink)}
.ab-meta b{font-family:var(--mono);font-size:11px;color:var(--faint);font-weight:500;margin-right:7px}
.rh-comp{display:flex;flex-wrap:wrap;gap:10px 26px;padding:18px 0;border-bottom:1px solid var(--line)}
.rh-comp .c{display:flex;gap:10px;align-items:center;font-size:13px;color:var(--ink)}
.rh-comp .lab{font-family:var(--mono);font-size:10px;color:#fff;background:var(--ink);border-radius:5px;padding:4px 8px;white-space:nowrap}
.r3{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(20px,3.4vw,40px);padding:26px 0 8px}
@media(max-width:840px){.rh{grid-template-columns:104px 1fr;gap:20px}.rh-photo{width:104px;height:130px}.r3{grid-template-columns:1fr;gap:22px}}
/* ---- VARIANT C extras: best3 + archive grid + contact ---- */
.c-bestwrap{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;padding:16px 0 42px}
.c-best{cursor:pointer}
.c-best .media{border-radius:12px;border:1px solid var(--line);overflow:hidden}
.c-best .media>img{aspect-ratio:9/16}
.c-best .no{font-family:var(--mono);font-size:11px;color:var(--accentink);margin-top:13px;display:block;letter-spacing:.06em}
.c-best h3{font-weight:800;font-size:18px;letter-spacing:-.02em;margin-top:6px}
.c-best .ro{color:var(--ink2);font-size:13px;margin-top:5px}
.c-best .de{color:var(--ink2);font-size:13px;margin-top:8px}
@media(max-width:840px){.c-bestwrap{grid-template-columns:1fr;gap:30px}}
.cg-grid{columns:4;column-gap:16px;padding:22px 0 44px}
@media(max-width:980px){.cg-grid{columns:3}}@media(max-width:640px){.cg-grid{columns:2}}
.cg-card{break-inside:avoid;margin-bottom:16px;border-radius:12px;overflow:hidden;border:1px solid var(--line);background:#fff;cursor:pointer;transition:transform .4s var(--ease),box-shadow .4s}
.cg-card:hover{transform:translateY(-4px);box-shadow:0 18px 36px -24px rgba(0,0,0,.24)}
.cg-card .media>img{aspect-ratio:9/16}
.cg-cap{padding:11px 13px;display:flex;flex-direction:column;gap:7px}
.cg-cap .ti{font-weight:680;font-size:13px;letter-spacing:-.02em;line-height:1.3}
.contact{border-top:1px solid var(--line);padding:clamp(54px,9vh,94px) 0;text-align:center}
.ct-h{font-weight:850;font-size:clamp(2rem,6vw,3.6rem);letter-spacing:-.035em;margin-top:12px}
.ct-mail{display:inline-block;margin-top:22px;font-size:clamp(16px,2.4vw,22px);font-weight:600;border-bottom:2px solid var(--ink);padding-bottom:4px}
.ct-mail:hover{color:var(--accentink);border-color:var(--accent)}
.ct-soc{margin-top:26px;display:flex;gap:22px;justify-content:center;flex-wrap:wrap}
.ct-soc a{font-family:var(--mono);font-size:12.5px;color:var(--ink2)}
.ct-soc a:hover{color:var(--accent)}

</style>
</head>
<body>
<header id="topbar">
  <div class="in">
    <span class="brand"><i></i>김한결 <small class="vlabel">PORTFOLIO PROPOSALS</small></span>
    <div class="tabs" id="tabs">
      <button data-v="a" class="on">시안 A · Index</button>
      <button data-v="b">시안 B · Gallery</button>
      <button data-v="c">시안 C · Résumé</button>
    </div>
    <div class="right">
      <span class="vlabel" id="vnote">화이트 · 미니멀</span>
      <button class="tbtn" id="editBtn"><span class="t">편집</span> ✎</button>
      <button class="tbtn" id="expBtn"><span class="t">내보내기</span> ↓</button>
    </div>
  </div>
</header>

<main id="stage"></main>
<div id="hoverprev"><video id="hpv" muted loop playsinline></video></div>

<div id="lb"><button class="x" id="lbx">✕</button><div class="bx">
  <video id="lbv" controls loop playsinline></video>

let io;
function mount(){

 document.getElementById("stage").innerHTML=R[activeV]();
 if(io)io.disconnect();

 document.querySelectorAll(".bcard,.c-wrow").forEach(el=>io.observe(el));
 document.querySelectorAll("[data-id]").forEach(el=>el.addEventListener("click",ev=>{if(document.body.classList.contains("editmode"))return;openLB(el.dataset.id);}));
 if(activeV==="a")bindHover();
 if(activeV==="b")bindFilter();
 if(activeV==="c")bindCFilter();
}

  document.querySelectorAll("#bfil button").forEach(b=>{
    b.onclick=()=>{
      document.querySelectorAll("#bfil button").forEach(x=>x.classList.remove("on"));
      b.classList.add("on");
      const f=b.dataset.f;
      g.querySelectorAll(".bcard").forEach(c=>{const w=WORKS.find(x=>x.id===c.dataset.id);c.style.display=(f==="all"||w.cat===f)?"":"none";});
    };
  });
}
function bindCFilter(){
  const g=document.getElementById("cgrid");
  document.querySelectorAll("#cfil button").forEach(b=>{
    b.onclick=()=>{
      document.querySelectorAll("#cfil button").forEach(x=>x.classList.remove("on"));
      b.classList.add("on");const f=b.dataset.f;
      g.querySelectorAll(".cg-card").forEach(c=>{c.style.display=(f==="all"||c.dataset.cat===f)?"":"none";});
    };
  });
}
const hp=document.getElementById("hoverprev"),hpv=document.getElementById("hpv");
function bindHover(){document.querySelectorAll(".idxrow").forEach(r=>{
  r.addEventListener("mouseenter",()=>{const w=WORKS.find(x=>x.id===r.dataset.id);hpv.src=vurl(w);hpv.play().catch(()=>{});hp.classList.add("show");});
  r.addEventListener("mouseleave",()=>{hp.classList.remove("show");hpv.pause();});
  r.addEventListener("mousemove",e=>{hp.style.left=(e.clientX+150)+"px";hp.style.top=e.clientY+"px";});});}

/* ---------- lightbox ---------- */
const lb=document.getElementById("lb");
function openLB(id){const w=WORKS.find(x=>x.id===id);if(!w)return;
 document.getElementById("lbc").textContent=CAT[w.cat];document.getElementById("lbt").textContent=w.title;
 document.getElementById("lbr").textContent=w.role+" · "+w.year;document.getElementById("lbd").textContent=w.desc;
 const v=document.getElementById("lbv");v.src=vurl(w);v.poster=purl(w);v.play().catch(()=>{});lb.classList.add("on");}
document.getElementById("lbx").onclick=()=>{lb.classList.remove("on");document.getElementById("lbv").pause();};
lb.onclick=e=>{if(e.target===lb){lb.classList.remove("on");document.getElementById("lbv").pause();}};

/* ---------- tabs ---------- */
document.querySelectorAll("#tabs button").forEach(b=>b.onclick=()=>{document.querySelectorAll("#tabs button").forEach(x=>x.classList.remove("on"));b.classList.add("on");activeV=b.dataset.v;mount();window.scrollTo(0,0);});

/* ---------- editor ---------- */
const ed=document.getElementById("edit");
document.getElementById("editBtn").onclick=()=>{ed.classList.toggle("on");document.body.classList.toggle("editmode",ed.classList.contains("on"));if(ed.classList.contains("on"))buildEd();};
document.getElementById("edClose").onclick=()=>{ed.classList.remove("on");document.body.classList.remove("editmode");};
function save(){const s={order:WORKS.map(w=>w.id),hidden:WORKS.filter(w=>w.hidden).map(w=>w.id),titles:{}};WORKS.forEach(w=>{if(w.title!==(DEFAULT.find(d=>d.id===w.id)||{}).title)s.titles[w.id]=w.title;});localStorage.setItem(LS,JSON.stringify(s));}
let dragId=null;
function buildEd(){const L=document.getElementById("edList");
 L.innerHTML=WORKS.map(w=>`<div class="eitem ${w.hidden?'hidden':''}" draggable="true" data-id="${w.id}">
   <div class="top"><span class="grip">⠿</span><span class="nm" contenteditable="true">${esc(w.title)}</span><span class="mini">${CAT[w.cat]}</span></div>
   <div class="actions"><button data-a="hide">${w.hidden?'표시':'숨김'}</button><button data-a="vid">영상 교체</button><button data-a="up">▲</button><button data-a="down">▼</button></div></div>`).join("");
 L.querySelectorAll(".eitem").forEach(it=>{const id=it.dataset.id;
  it.addEventListener("dragstart",()=>{dragId=id;it.classList.add("drag");});
  it.addEventListener("dragend",()=>{it.classList.remove("drag");});
  it.addEventListener("dragover",e=>e.preventDefault());
  it.addEventListener("drop",e=>{e.preventDefault();reorder(dragId,id);});
  it.querySelector(".nm").addEventListener("input",e=>{const w=WORKS.find(x=>x.id===id);w.title=e.target.textContent;});
  it.querySelector(".nm").addEventListener("blur",()=>{save();mount();});
  it.querySelectorAll(".actions button").forEach(b=>b.onclick=()=>act(b.dataset.a,id));});}
function reorder(from,to){if(from===to)return;const fi=WORKS.findIndex(w=>w.id===from),ti=WORKS.findIndex(w=>w.id===to);const[m]=WORKS.splice(fi,1);WORKS.splice(ti,0,m);save();buildEd();mount();}
function act(a,id){const i=WORKS.findIndex(w=>w.id===id),w=WORKS[i];
 if(a==="hide"){w.hidden=!w.hidden;}
 if(a==="up"&&i>0){WORKS.splice(i,1);WORKS.splice(i-1,0,w);}
 if(a==="down"&&i<WORKS.length-1){WORKS.splice(i,1);WORKS.splice(i+1,0,w);}
 if(a==="vid"){pendId=id;document.getElementById("vidPick").click();return;}
 save();buildEd();mount();}
let pendId=null;
document.getElementById("vidPick").onchange=e=>{const f=e.target.files[0];if(!f||!pendId)return;const w=WORKS.find(x=>x.id===pendId);w._local=URL.createObjectURL(f);w._newfile=f.name;save();buildEd();mount();alert("미리보기로 교체했습니다: "+f.name+"\n실제 반영은 이 파일을 assets/video/ 에 올리고 내보내기 설정을 적용하세요.");};
document.getElementById("edReset").onclick=()=>{localStorage.removeItem(LS);WORKS=DEFAULT.map(w=>Object.assign({},w));buildEd();mount();};
function exportCfg(){const s={order:WORKS.map(w=>w.id),hidden:WORKS.filter(w=>w.hidden).map(w=>w.id),titles:{},newVideos:{}};
 WORKS.forEach(w=>{const d=DEFAULT.find(x=>x.id===w.id);if(d&&w.title!==d.title)s.titles[w.id]=w.title;if(w._newfile)s.newVideos[w.id]=w._newfile;});
 const blob=new Blob([JSON.stringify(s,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="portfolio-config.json";a.click();}
document.getElementById("expBtn").onclick=exportCfg;document.getElementById("edExport").onclick=exportCfg;

mount();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>김한결 — 이력서 디자인 시안 (3종)</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>
<style>
:root{--bg:#fff;--paper:#f7f6f3;--ink:#17140f;--ink2:#5c564c;--faint:#a39c90;--line:#ece9e3;--line2:#ddd9d1;--accent:#ff6f0f;--accentink:#e85d00;--mono:"SFMono-Regular",ui-monospace,Menlo,Consolas,monospace;--san:"Pretendard Variable",Pretendard,-apple-system,system-ui,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;--ease:cubic-bezier(.22,.61,.18,1)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--san);line-height:1.6;letter-spacing:-.012em;-webkit-font-smoothing:antialiased}
::selection{background:var(--accent);color:#fff}
a{color:inherit;text-decoration:none}img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer}
.mono{font-family:var(--mono)}
#topbar{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
#topbar .in{max-width:1280px;margin:0 auto;padding:0 22px;height:58px;display:flex;align-items:center;gap:16px}
.brand{font-weight:800;font-size:14px;display:flex;gap:8px;align-items:center}.brand i{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.brand small{font-family:var(--mono);color:var(--faint);font-size:11px;letter-spacing:.08em}
.tabs{display:flex;gap:4px;background:var(--paper);border:1px solid var(--line);border-radius:100px;padding:4px;margin-left:6px}
.tabs button{border:0;background:none;font-size:13px;color:var(--ink2);padding:7px 15px;border-radius:100px;font-weight:600;transition:.2s}
.tabs button.on{background:var(--ink);color:#fff}
#topbar .right{margin-left:auto}
.dl{font-size:12.5px;border:1px solid var(--ink);background:var(--ink);color:#fff;padding:9px 16px;border-radius:100px;font-weight:600}
.stage{max-width:1180px;margin:0 auto;padding:clamp(34px,6vh,68px) 22px 80px}
.ey{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accentink);display:block}
.o{color:var(--accent)}
/* shared resume blocks */
.blk{margin-bottom:4px}
.blk h5{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accentink);border-bottom:1px solid var(--ink);padding-bottom:7px;margin-bottom:4px;display:flex;justify-content:space-between}
.row{display:flex;gap:14px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.row:last-child{border-bottom:0}
.row .yr{font-family:var(--mono);font-size:11.5px;color:var(--faint);min-width:96px;white-space:nowrap}
.row .bd b{font-weight:700}.row .bd small{display:block;color:var(--ink2);font-size:12px;margin-top:2px}
.skill{display:flex;gap:10px;padding:7px 0;flex-wrap:wrap;align-items:baseline;border-bottom:1px solid var(--line)}
.skill:last-child{border-bottom:0}
.skill .k{font-family:var(--mono);font-size:11px;color:var(--faint);min-width:32px}
.skill .v{display:flex;flex-wrap:wrap;gap:6px}.skill .v span{font-size:12px;border:1px solid var(--line2);border-radius:6px;padding:3px 8px}
.aw{break-inside:avoid;display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
.aw .pz{font-weight:800;color:var(--accentink);min-width:50px;white-space:nowrap;font-size:12.5px}
.aw .d small{display:block;color:var(--ink2);font-size:11.5px;margin-top:2px}
.photo{border-radius:14px;overflow:hidden;background:#eceae5;border:1px solid var(--line2)}
.photo img{width:100%;height:100%;object-fit:cover;display:block}
.tag{font-weight:760;letter-spacing:-.02em}
.desc{color:var(--ink2)}
.comp{display:flex;flex-wrap:wrap;gap:9px 24px}
.comp .c{display:flex;gap:10px;align-items:center;font-size:13px}
.comp .lab{font-family:var(--mono);font-size:10px;color:#fff;background:var(--ink);border-radius:5px;padding:4px 8px;white-space:nowrap}
.meta{display:flex;flex-wrap:wrap;gap:9px 20px;font-size:13px}
.meta b{font-family:var(--mono);font-size:11px;color:var(--faint);font-weight:500;margin-right:7px}
.nm{font-weight:850;letter-spacing:-.03em}.nm span{font-family:var(--mono);font-size:12px;color:var(--faint);font-weight:500;margin-left:9px;letter-spacing:.12em}

/* R1 — Balanced grid */
.r1-head{display:grid;grid-template-columns:150px 1fr;gap:clamp(22px,4vw,48px);align-items:center;padding-bottom:28px;border-bottom:1px solid var(--line)}
.r1-head .photo{width:150px;height:188px}
.r1 .nm{font-size:clamp(1.5rem,3vw,2.2rem)}
.r1 .tag{font-size:clamp(1.05rem,2vw,1.5rem);line-height:1.32;margin-top:8px;max-width:30ch}
.r1 .desc{margin-top:13px;font-size:14.5px;max-width:60ch}.r1 .meta{margin-top:16px}
.r1-comp{padding:18px 0;border-bottom:1px solid var(--line)}
.r1-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(22px,3.4vw,40px);padding:26px 0 16px}
.r1-aw{columns:2;column-gap:34px;padding-top:6px}
@media(max-width:820px){.r1-head{grid-template-columns:108px 1fr;gap:20px}.r1-head .photo{width:108px;height:135px}.r1-cols{grid-template-columns:1fr;gap:22px}.r1-aw{columns:1}}

/* R2 — Single column document */
.r2{max-width:740px;margin:0 auto}
.r2 .photo{width:120px;height:150px;margin:0 auto 18px}
.r2-c{text-align:center;padding-bottom:28px;border-bottom:1px solid var(--line)}
.r2 .nm{font-size:clamp(1.6rem,4vw,2.4rem)}
.r2 .tag{font-size:clamp(1.1rem,2.4vw,1.6rem);margin-top:10px}
.r2 .desc{margin:13px auto 0;font-size:14.5px;max-width:54ch}
.r2 .meta{margin-top:16px;justify-content:center}
.r2 .comp{margin-top:18px;justify-content:center}
.r2 .blk{margin-top:30px}
.r2-aw{columns:2;column-gap:30px;padding-top:4px}
@media(max-width:680px){.r2-aw{columns:1}}

/* R3 — Sidebar */
.r3{display:grid;grid-template-columns:300px 1fr;gap:clamp(28px,5vw,64px);align-items:start}
.r3-side{position:sticky;top:80px}
.r3-side .photo{width:100%;aspect-ratio:4/5;margin-bottom:18px}
.r3-side .nm{font-size:1.7rem}
.r3-side .meta{margin-top:16px;flex-direction:column;gap:8px}
.r3-side .blk{margin-top:24px}
.r3-side .comp{flex-direction:column;align-items:flex-start;gap:10px;margin-top:8px}
.r3-main .tag{font-size:clamp(1.3rem,2.6vw,1.9rem);line-height:1.3;max-width:24ch}
.r3-main .desc{margin-top:14px;font-size:15px;max-width:56ch}
.r3-main .blk{margin-top:30px}
.r3-aw{columns:2;column-gap:30px;padding-top:4px}
@media(max-width:860px){.r3{grid-template-columns:1fr;gap:30px}.r3-side{position:static}.r3-side .photo{max-width:200px}.r3-aw{columns:1}}
.pfoot{border-top:1px solid var(--line);margin-top:50px;padding-top:24px;color:var(--faint);font-family:var(--mono);font-size:12px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
</style>
</head>
<body>
<header id="topbar"><div class="in">
  <span class="brand"><i></i>김한결 <small>RÉSUMÉ PROPOSALS</small></span>
  <div class="tabs" id="tabs"><button data-r="1" class="on">시안 1 · Grid</button><button data-r="2">시안 2 · Document</button><button data-r="3">시안 3 · Sidebar</button></div>
  <div class="right"><a class="dl" href="resume.html" download="이력서시안.html">다운로드 ↓</a></div>
</div></header>
<main class="stage" id="stage"></main>
<script>
const BASE="https://hansy-daangn.github.io/pf/assets/";
const A={
 tagline:'시선을 유도해 의미를 전하는 <span class="o">김한결</span>입니다.',
 desc:"영화·전시·공모전을 통해 시선과 설득의 원리를 익혔고, 학술 논문과 콘텐츠로 영상 제작의 방법을 연구했습니다. 그 원리를 퍼포먼스 광고에 적용해, 한 컷 안에서 시선이 흐르는 길을 설계합니다.",
 info:[["직무","영상 디자이너 · 당근(Karrot)"],["생년","2000.01.14"],["연락처","010-5765-7132"],["이메일","hansy@daangn.com"]],
 comp:[["보유 역량","기획·연출·편집까지 한 사람이 끝까지 끌고 가는 풀사이클 제작"],["기술 역량","3D 모션그래픽 · 익스프레션 템플릿 시스템 · AI 비주얼"]],
 edu:[["2024 — 2025","동아방송예술대학교","콘텐츠제작과 전공심화 졸업"],["2019 — 2024","동아방송예술대학교","영상제작과 졸업"],["2016 — 2019","인천마전고등학교","졸업"]],
 career:[["현재","당근 (Karrot)","영상 디자이너 · 퍼포먼스 마케팅 영상"],["2022","유아트컴퍼니","영상 PD · 영상기획/모션그래픽"],["2021 — 2022","육군사관학교","영상콘텐츠 디자이너 · 촬영/편집/모션그래픽"]],
 skills:[["2D",["After Effects","Expressions/JS","Premiere Pro","Photoshop","Illustrator","DaVinci Resolve"]],["3D",["Cinema 4D","Xpresso·Python","Redshift","Blender","Marvelous","Reality Capture","Unreal Engine"]],["AI",["Stable Diffusion","ComfyUI","img2video"]],["etc",["Figma","PowerPoint","Notion","Obsidian"]]],
 awards:[["2등상","제이비피코리아 영상 공모전","3D 영상 · 개인 작품 · 2025"],["최우수상","한국방송미디어공학회 — 대학생·주니어 논문 경진대회","모션그래픽 학술 논문 · 제1저자 · 2024"],["특별상","큰사람커넥트 — 제2회 이야기 모바일 영상 공모전","모션그래픽 · 개인 작품 · 2024"],["대상","동아방송예술대학교 — 제24회 졸업작품전","단편영화 · 감독·편집 · 2023"],["특별상","자생의료재단 — 독립운동 콘텐츠 공모전","3D 영상 · 개인 작품 · 2023"],["우수상","한국연구재단 — 랩스튜디오 영상 경진대회","홍보영상 · 연출 · 2020"],["최우수상","I&CO 성형외과 — UCC 공모전","3D 영상 · 개인 작품 · 2019"],["우수상","상시 수기 UCC 공모전","3D 영상 · 개인 작품 · 2018"],["은상","국세청 — 2018 청렴 콘텐츠 공모전","영상 촬영 · 개인 작품 · 2018"],["대상","남양주시청 — 정약용 홍보영상 공모전","3D 영상 · 개인 작품 · 2018"],["동상","한국복지대학교 — 제3회 전국 고등학생 UCC 공모전","모션그래픽 · 개인 작품 · 2017"],["대상","경기도청 — 제2회 남한산성 청소년 영상제","모션그래픽 · 개인 작품 · 2017"]]
};
const esc=s=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const photo=`<div class="photo"><img src="${BASE}img/profile.jpg" alt="김한결"/></div>`;
const name=`<div class="nm">김한결 <span>HANSY</span></div>`;
const meta=`<div class="meta">${A.info.map(r=>`<span><b>${r[0]}</b>${esc(r[1])}</span>`).join("")}</div>`;
const comp=`<div class="comp">${A.comp.map(c=>`<div class="c"><span class="lab">${c[0]}</span><span>${esc(c[1])}</span></div>`).join("")}</div>`;
const eduBlk=`<div class="blk"><h5>학력 <span>Education</span></h5>${A.edu.map(x=>`<div class="row"><span class="yr">${x[0]}</span><span class="bd"><b>${esc(x[1])}</b><small>${esc(x[2])}</small></span></div>`).join("")}</div>`;
const carBlk=`<div class="blk"><h5>경력 <span>Career</span></h5>${A.career.map(x=>`<div class="row"><span class="yr">${x[0]}</span><span class="bd"><b>${esc(x[1])}</b><small>${esc(x[2])}</small></span></div>`).join("")}</div>`;
const skBlk=`<div class="blk"><h5>기술 <span>Toolset</span></h5>${A.skills.map(x=>`<div class="skill"><span class="k">${x[0]}</span><span class="v">${x[1].map(t=>`<span>${esc(t)}</span>`).join("")}</span></div>`).join("")}</div>`;
const awBlk=cls=>`<div class="blk"><h5>수상 경력 <span>Awards · 12</span></h5><div class="${cls}">${A.awards.map(a=>`<div class="aw"><span class="pz">${a[0]}</span><span class="d">${esc(a[1])}<small>${esc(a[2])}</small></span></div>`).join("")}</div></div>`;
const foot=`<div class="pfoot"><span>© ${new Date().getFullYear()} 김한결 (HANSY)</span><span>이력서 · 화이트 / 미니멀 시안</span></div>`;

function R1(){return `<div class="r1"><span class="ey">Résumé · 이력서</span>
  <div class="r1-head" style="margin-top:14px">${photo}<div>${name}<div class="tag">${A.tagline}</div><p class="desc">${esc(A.desc)}</p>${meta}</div></div>
  <div class="r1-comp">${comp}</div>
  <div class="r1-cols">${eduBlk}${carBlk}${skBlk}</div>
  ${awBlk("r1-aw")}${foot}</div>`;}
function R2(){return `<div class="r2"><div class="r2-c"><span class="ey">Résumé · 이력서</span>${photo.replace('class="photo"','class="photo"')}
  ${name}<div class="tag">${A.tagline}</div><p class="desc">${esc(A.desc)}</p>${meta}${comp}</div>
  ${eduBlk}${carBlk}${skBlk}${awBlk("r2-aw")}${foot}</div>`;}
function R3(){return `<div class="r3"><aside class="r3-side"><span class="ey">Résumé</span>${photo}${name}${meta}<div class="blk">${comp}</div>${skBlk}</aside>
  <div class="r3-main"><div class="tag">${A.tagline}</div><p class="desc">${esc(A.desc)}</p>${eduBlk}${carBlk}${awBlk("r3-aw")}${foot}</div></div>`;}
const RM={1:R1,2:R2,3:R3};let cur="1";
function mount(){document.body.dataset.r=cur;document.getElementById("stage").innerHTML=RM[cur]();}
document.querySelectorAll("#tabs button").forEach(b=>b.onclick=()=>{document.querySelectorAll("#tabs button").forEach(x=>x.classList.remove("on"));b.classList.add("on");cur=b.dataset.r;mount();scrollTo(0,0);});
mount();
</script>
</body>
</html>

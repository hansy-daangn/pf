const esc=s=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const vid=id=>"assets/video/"+id+".mp4", full=id=>"assets/full/"+id+".mp4", pos=id=>"assets/poster/"+id+".jpg";
const SQ=new Set(["td_review2605","mg_bizreview","td_declutter"]), LS=new Set(["3d_sew","mg_charge"]);
const arOf=id=>SQ.has(id)?"1 / 1":LS.has(id)?"16 / 9":"9 / 16";

    <div class="blk"><h5>학력 <span>Education</span></h5>${A.edu.map((e,i)=>brow("r.edu."+i,e)).join("")}</div>
    <div class="blk"><h5>기술 <span>Toolset</span></h5>${A.skills.map((s,i)=>`<div class="skill"><span class="k">${esc(s[0])}</span><span class="v">${s[1].map((t,j)=>`<span data-k="r.sk.${i}.${j}">${esc(t)}</span>`).join("")}</span></div>`).join("")}</div>

/* ---- edits (content.json + localStorage) ---- */
let EDITS={};
async function loadEdits(){
  try{const r=await fetch("content.json?"+Date.now());if(r.ok)EDITS=await r.json();}catch(e){}
  try{const l=JSON.parse(localStorage.getItem("pf_edits")||"null");if(l)EDITS=Object.assign(EDITS,l);}catch(e){}
}
function applyEdits(){for(const k in EDITS){
  if(k.indexOf("photo.")===0){const f=document.getElementById("photoFrame");if(f&&EDITS[k]!=null)f.style.setProperty("--"+k.slice(6),EDITS[k]);continue;}
  const el=document.querySelector('[data-k="'+k+'"]');if(el&&EDITS[k]!=null)el.textContent=EDITS[k];}}

/* ---- photo crop adjust ---- */
function setupPhotoAdjust(){
  const f=document.getElementById("photoFrame");if(!f)return;
  const gv=(p,d)=>parseFloat(f.style.getPropertyValue("--"+p))||d;
  let drag=false,sx,sy,bx0,by0;
  f.addEventListener("pointerdown",e=>{if(!editing)return;drag=true;sx=e.clientX;sy=e.clientY;bx0=gv("bx",50);by0=gv("by",18);try{f.setPointerCapture(e.pointerId);}catch(_){}});
  f.addEventListener("pointermove",e=>{if(!drag)return;const dx=e.clientX-sx,dy=e.clientY-sy;f.style.setProperty("--bx",Math.max(-60,Math.min(160,bx0-dx*0.22))+"%");f.style.setProperty("--by",Math.max(-60,Math.min(160,by0-dy*0.22))+"%");});
  const end=()=>drag=false;f.addEventListener("pointerup",end);f.addEventListener("pointercancel",end);
  f.addEventListener("wheel",e=>{if(!editing)return;e.preventDefault();let s=gv("bs",178);s=Math.min(360,Math.max(110,s-e.deltaY*0.09));f.style.setProperty("--bs",s+"%");},{passive:false});
}
/* ---- render ---- */
const io=new IntersectionObserver(es=>es.forEach(e=>{const v=e.target.querySelector("video"),m=e.target.querySelector(".media");if(!v)return;if(e.isIntersecting){if(!v.src&&v.dataset.src)v.src=v.dataset.src;v.play().then(()=>m&&m.classList.add("playing")).catch(()=>{});}else{v.pause();}}),{rootMargin:"90px 0px",threshold:.25});
function render(){
  document.getElementById("main").innerHTML=resumeHTML()+bestHTML()+archiveHTML()+contactHTML();
  applyEdits();
  setupPhotoAdjust();
  document.querySelectorAll(".bcard,.acard").forEach(c=>io.observe(c));
  document.querySelectorAll("[data-id]").forEach(el=>el.addEventListener("click",()=>{if(!editing)openLB(el.dataset.id);}));
  const g=document.getElementById("agrid");
  document.querySelectorAll("#afil button").forEach(b=>b.onclick=()=>{if(editing)return;document.querySelectorAll("#afil button").forEach(x=>x.classList.remove("on"));b.classList.add("on");const f=b.dataset.f;g.querySelectorAll(".acard").forEach(c=>c.style.display=(f==="all"||c.dataset.cat===f)?"":"none");});
}
/* ---- lightbox ---- */
const lb=document.getElementById("lb");
function openLB(id){const w=W.find(x=>x.id===id);if(!w)return;const t=k=>(EDITS["w."+id+"."+k]!=null?EDITS["w."+id+"."+k]:w[k]);
  document.getElementById("lbc").textContent=CAT[w.cat];document.getElementById("lbt").textContent=t("title");
  document.getElementById("lbr").textContent=t("role")+" · "+w.year;document.getElementById("lbd").textContent=t("desc");
  const v=document.getElementById("lbv");document.querySelectorAll(".bcard video,.acard video").forEach(x=>{try{x.pause();}catch(e){}});v.src=full(id);v.poster=pos(id);v.muted=false;v.volume=1;try{v.currentTime=0;}catch(e){}v.play().catch(()=>{});lb.classList.add("on");}
document.getElementById("lbx").onclick=()=>{lb.classList.remove("on");document.getElementById("lbv").pause();};
lb.onclick=e=>{if(e.target===lb){lb.classList.remove("on");document.getElementById("lbv").pause();}};
addEventListener("keydown",e=>{if(e.key==="Escape")lb.classList.remove("on");});

/* ---- edit mode ---- */
let editing=false;
const fab=document.getElementById("editFab");
fab.onclick=()=>{editing=!editing;document.body.classList.toggle("editing",editing);fab.classList.toggle("on",editing);fab.textContent=editing?"✔":"✎";document.getElementById("editHint").classList.toggle("on",editing);
  document.querySelectorAll("[data-k]").forEach(el=>el.contentEditable=editing);
  if(editing){document.querySelectorAll(".acard,.bcard").forEach(c=>{const v=c.querySelector("video");if(v)v.pause();});}
  else saveEdits();
};
async function saveEdits(){
  const E={};document.querySelectorAll("[data-k]").forEach(el=>{E[el.dataset.k]=el.textContent.replace(/\s+$/,"");});
  const _pf=document.getElementById("photoFrame");if(_pf){["bs","bx","by"].forEach(p=>{const v=_pf.style.getPropertyValue("--"+p);if(v)E["photo."+p]=v.trim();});}
  EDITS=Object.assign(EDITS,E);localStorage.setItem("pf_edits",JSON.stringify(E));
  let pat=localStorage.getItem("pf_pat");
  if(!pat){pat=prompt("GitHub에 영구 저장하려면 토큰을 한 번만 입력하세요.\n(github.com → Settings → Developer settings → Fine-grained token, 저장소 hansy-daangn/pf 의 Contents: Read and write)\n토큰은 이 브라우저에만 저장됩니다. 비워두면 이 브라우저에만 저장됩니다.");if(pat)localStorage.setItem("pf_pat",pat);}
  if(!pat){alert("이 브라우저에 영구 저장했습니다. (GitHub 반영은 토큰 입력 시)");return;}
  try{
    const api="https://api.github.com/repos/hansy-daangn/pf/contents/content.json";
    let sha=null;const g=await fetch(api,{headers:{Authorization:"Bearer "+pat}});if(g.ok)sha=(await g.json()).sha;
    const body={message:"edit: update site text",content:btoa(unescape(encodeURIComponent(JSON.stringify(EDITS,null,1))))};if(sha)body.sha=sha;
    const r=await fetch(api,{method:"PUT",headers:{Authorization:"Bearer "+pat,"Content-Type":"application/json"},body:JSON.stringify(body)});
    if(r.ok)alert("저장 완료 — GitHub에 반영했습니다. 약 30초 뒤 모든 기기에서 영구 적용됩니다.");
    else{const e=await r.json().catch(()=>({}));alert("GitHub 저장 실패: "+(e.message||r.status)+"\n(이 브라우저에는 저장됨)");if(r.status===401||r.status===403)localStorage.removeItem("pf_pat");}
  }catch(e){alert("네트워크 오류 — 이 브라우저에는 저장됨. "+e.message);}
}
/* nav reveal */
addEventListener("scroll",()=>document.querySelector("header.top").style.boxShadow=scrollY>20?"0 1px 0 var(--line)":"none",{passive:true});
loadEdits().then(render);
</script>

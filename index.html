<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>김한결 · 영상 디자이너 — HANSY</title>
<meta name="description" content="당근(Karrot) 퍼포먼스 마케팅 영상 디자이너 김한결의 포트폴리오. 3D · 모션그래픽 · AI."/>
<meta property="og:title" content="김한결 · 영상 디자이너 — HANSY"/>
<meta property="og:image" content="assets/poster/td_review2605.jpg"/>
<meta name="theme-color" content="#ffffff"/>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>
<style>
:root{--bg:#fff;--ink:#17140f;--ink2:#5c564c;--faint:#a39c90;--line:#ece9e3;--line2:#ddd9d1;--accent:#ff6f0f;--accentink:#e85d00;--mono:"SFMono-Regular",ui-monospace,Menlo,Consolas,monospace;--san:"Pretendard Variable",Pretendard,-apple-system,system-ui,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;--maxw:1140px;--ease:cubic-bezier(.22,.61,.18,1)}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--san);line-height:1.6;letter-spacing:-.012em;-webkit-font-smoothing:antialiased;word-break:keep-all;overflow-wrap:break-word}
::selection{background:var(--accent);color:#fff}
a{color:inherit;text-decoration:none}img,video{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 22px}
.mono{font-family:var(--mono)}

/* header */
header.top{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.top .in{max-width:var(--maxw);margin:0 auto;padding:0 22px;height:58px;display:flex;align-items:center;justify-content:space-between}
.brand{font-weight:800;font-size:15px;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.brand i{width:7px;height:7px;border-radius:50%;background:var(--accent)}
nav.menu{display:flex;gap:22px;align-items:center}
nav.menu a{font-size:13.5px;color:var(--ink2);font-weight:600}
nav.menu a:hover{color:var(--ink)}
nav.menu a.cta{border:1px solid var(--line2);padding:7px 14px;border-radius:100px}
nav.menu a.cta:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
@media(max-width:680px){nav.menu a:not(.cta){display:none}}

section{position:relative}

/* RESUME — minimal, only 2 dividers */
.resume{padding:clamp(32px,6vh,60px) 0 6px}
.rh{display:grid;grid-template-columns:140px 1fr;gap:clamp(20px,4vw,44px);align-items:start;padding-bottom:24px;border-bottom:1px solid var(--line)}
.rh-photo{width:140px;height:176px;flex:none;background:#fff;border:1px solid var(--line2);border-radius:13px;padding:7px;box-shadow:0 10px 26px -16px rgba(0,0,0,.22);position:relative}
.rh-photo .frame{width:100%;height:100%;border-radius:7px;overflow:hidden;background-color:#eceae5;background-repeat:no-repeat;background-size:var(--bs,178%);background-position:var(--bx,50%) var(--by,18%);position:relative}
.rh-photo .frame::after{content:"";position:absolute;inset:0;border-radius:7px;box-shadow:inset 0 0 22px rgba(0,0,0,.10),inset 0 0 0 1px rgba(0,0,0,.05);pointer-events:none}
.editing .rh-photo{outline:2px dashed var(--accent);outline-offset:3px}
.editing .rh-photo .frame{cursor:grab}.editing .rh-photo .frame:active{cursor:grabbing}
.photohint{display:none}
.editing .photohint{display:block;position:absolute;left:50%;bottom:-24px;transform:translateX(-50%);white-space:nowrap;font-family:var(--mono);font-size:9px;color:#fff;background:var(--accent);border-radius:100px;padding:3px 9px}
.rh-name{font-weight:850;font-size:clamp(1.5rem,3vw,2.1rem);letter-spacing:-.03em}
.rh-tag{font-size:clamp(1.05rem,1.7vw,1.3rem);line-height:1.45;margin-top:12px;font-weight:760}
.rh-desc{margin-top:14px;color:var(--ink2);font-size:14px;line-height:1.65}
.rh-meta{margin-top:16px;display:flex;flex-wrap:wrap;gap:7px 18px}
.ab-meta{font-size:13px;color:var(--ink)}.ab-meta b{font-family:var(--mono);font-size:10.5px;color:var(--faint);font-weight:500;margin-right:6px;text-transform:uppercase;letter-spacing:.03em}
.rh-comp{display:flex;flex-wrap:wrap;gap:7px 26px;padding:15px 0 2px}
.rh-comp .c{display:flex;gap:9px;align-items:baseline;font-size:13px;color:var(--ink2)}
.rh-comp .lab{font-family:var(--mono);font-size:10px;color:var(--ink);font-weight:600;white-space:nowrap;letter-spacing:.02em}
.r3{display:grid;grid-template-columns:1fr 1fr 1.25fr;gap:clamp(18px,3vw,38px);padding:16px 0 4px}
.blk h5{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);font-weight:600;margin-bottom:9px}
.brow{display:flex;gap:12px;padding:4px 0;font-size:13px}
.brow .yr{font-family:var(--mono);font-size:11px;color:var(--faint);min-width:88px;white-space:nowrap}
.brow .bd b{font-weight:700}.brow .bd small{display:block;color:var(--ink2);font-size:12px;margin-top:1px}
.skills{display:flex;flex-wrap:wrap;gap:6px}
.skills span{font-size:12px;border:1px solid var(--line2);border-radius:6px;padding:3px 8px;color:var(--ink2)}
.skills.editing-csv{display:block;font-size:13px;padding:8px 12px;border:1px dashed var(--accent);border-radius:8px;background:#fff7f0;line-height:1.7;color:var(--ink);white-space:normal}
.skills.editing-csv span{all:unset}
.awblk{margin-top:18px;padding-top:18px;border-top:1px solid var(--line)}
.awblk h5{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);font-weight:600;margin-bottom:11px}
.awtable{columns:3;column-gap:26px}
.awrow{break-inside:avoid;display:flex;gap:10px;padding:5px 0;font-size:12px}
.awrow .pz{font-weight:700;color:var(--ink);min-width:46px;white-space:nowrap;font-size:11.5px}
.awrow .d{color:var(--ink)}.awrow .d small{display:block;color:var(--faint);font-size:11px;margin-top:1px}
@media(max-width:880px){.r3{grid-template-columns:1fr;gap:18px}.awtable{columns:2}}
@media(max-width:560px){.awtable{columns:1}.rh{grid-template-columns:104px 1fr;gap:18px}.rh-photo{width:104px;height:130px}}

/* sections — no visible section headings */
.sec{padding:clamp(40px,7vh,80px) 0 4px}

.media{position:relative;overflow:hidden;background:#eceae5}
.media>img{width:100%;height:100%;object-fit:cover;display:block}
.media>video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .5s}
.media.playing>video{opacity:1}
.catpill{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);border:1px solid var(--line2);border-radius:100px;padding:4px 9px;background:#fff;display:inline-block}
.grouptag{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.94);border:1px solid var(--line2);border-radius:100px;padding:3px 8px;font-family:var(--mono);font-size:9px;letter-spacing:.06em;color:var(--ink);z-index:1;font-weight:600}

/* best 3 */
.best{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;padding:8px 0 6px}
.bcard{cursor:pointer;position:relative}
.bcard .media{border-radius:13px;border:1px solid var(--line)}
.bcard h3{font-weight:800;font-size:17px;letter-spacing:-.02em;margin-top:14px}
.bcard .ro{color:var(--ink2);font-size:13px;margin-top:5px}
.bcard .de{color:var(--ink2);font-size:13px;margin-top:8px;line-height:1.55}
@media(max-width:840px){.best{grid-template-columns:1fr;gap:26px}}

/* archive */
.afil{display:flex;gap:8px;flex-wrap:wrap;padding:16px 0 4px}
.afil button{font-size:13px;border:1px solid var(--line2);background:#fff;color:var(--ink2);padding:8px 16px;border-radius:100px;font-weight:600;transition:.2s}
.afil button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.agrid{columns:4;column-gap:16px;padding:16px 0 40px}
@media(max-width:980px){.agrid{columns:3}}@media(max-width:640px){.agrid{columns:2}}
.acard{break-inside:avoid;margin-bottom:16px;border-radius:12px;overflow:hidden;border:1px solid var(--line);background:#fff;cursor:pointer;transition:transform .4s var(--ease),box-shadow .4s;position:relative}
.acard:hover{transform:translateY(-4px);box-shadow:0 18px 36px -24px rgba(0,0,0,.22)}
.acap{padding:10px 12px;display:flex;flex-direction:column;gap:6px}
.acap .ti{font-weight:680;font-size:13px;letter-spacing:-.02em;line-height:1.3}

/* contact */
.contact{border-top:1px solid var(--line);padding:clamp(50px,9vh,90px) 0;text-align:center}
.ct-h{font-weight:850;font-size:clamp(2rem,6vw,3.4rem);letter-spacing:-.035em}
.ct-mail{display:inline-block;margin-top:20px;font-size:clamp(16px,2.4vw,22px);font-weight:600;border-bottom:2px solid var(--ink);padding-bottom:4px}
.ct-mail:hover{color:var(--accentink);border-color:var(--accent)}

/* lightbox */
#lb{position:fixed;inset:0;z-index:80;background:#fff;display:none;align-items:flex-start;justify-content:center;padding:28px;overflow:auto}
#lb.on{display:flex}
#lb .bx{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:30px;max-width:1140px;width:100%;align-items:start}
#lb .lb-media{display:flex;flex-direction:column;gap:12px;min-width:0}
#lb .lb-stage{display:flex;align-items:center;justify-content:center;min-width:0}
#lb .lb-stage video,#lb .lb-stage img{width:auto;max-width:100%;max-height:78vh;border-radius:12px;border:1px solid var(--line2);background:#000;object-fit:contain}
#lb .lb-thumbs{display:flex;gap:8px;flex-wrap:wrap}
#lb .lb-thumb{border:1px solid var(--line2);border-radius:8px;overflow:hidden;background:#eceae5;padding:0;position:relative;cursor:pointer;transition:.2s;display:block;width:58px;height:58px}
#lb .lb-thumb.active{outline:2px solid var(--ink);outline-offset:-1px}
#lb .lb-thumb:hover:not(.active){border-color:var(--ink)}
#lb .lb-thumb img{display:block;width:100%;height:100%;object-fit:cover}
#lb .lb-thumb .lab{position:absolute;bottom:2px;left:2px;right:2px;background:rgba(0,0,0,.72);color:#fff;font-size:8px;padding:2px 4px;border-radius:4px;font-family:var(--mono);letter-spacing:.02em;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#lb .lb-thumb.vid .lab::before{content:"▶ "}
#lb h3{font-weight:820;font-size:clamp(1.3rem,2.6vw,1.9rem);letter-spacing:-.02em}
#lb .ro{color:var(--ink2);font-weight:600;margin-top:9px;font-size:14px}
#lb .de{color:var(--ink2);margin-top:14px;font-size:14.5px;line-height:1.65}
#lb .kv{margin-top:22px;border-top:1px solid var(--line);padding-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:10px 18px}
#lb .kv .row{font-size:12px;min-width:0}
#lb .kv .row b{display:block;font-family:var(--mono);font-size:10px;color:var(--faint);font-weight:500;letter-spacing:.04em;margin-bottom:3px;text-transform:uppercase}
#lb .kv .row span{color:var(--ink);word-break:break-word}
#lb .perf{margin-top:20px;border-top:1px solid var(--line);padding-top:16px}
#lb .perf .ph{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--accentink);font-weight:600;margin-bottom:11px;display:flex;align-items:center;gap:7px}
#lb .perf .ph i{width:5px;height:5px;border-radius:50%;background:var(--accent);display:inline-block}
#lb .perf .tiles{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:10px;overflow:hidden}
#lb .perf .tile{background:#fff;padding:11px 12px}
#lb .perf .tile .v{font-weight:820;font-size:17px;letter-spacing:-.02em;color:var(--ink)}
#lb .perf .tile .l{font-size:10.5px;color:var(--ink2);margin-top:2px}
#lb .perf .src{font-size:10px;color:var(--faint);margin-top:9px;font-family:var(--mono)}
#lb .lb-thumbs .thgap{width:16px;height:1px;flex:0 0 16px;pointer-events:none}
#lb .x{position:fixed;top:18px;right:22px;width:42px;height:42px;border-radius:50%;border:1px solid var(--line2);background:#fff;font-size:18px;display:grid;place-items:center;z-index:1}
@media(max-width:780px){#lb .bx{grid-template-columns:1fr}#lb .lb-stage video,#lb .lb-stage img{max-height:56vh}}

/* manage (edit-mode asset curation) */
#ngFab{position:fixed;right:22px;bottom:84px;z-index:70;height:44px;padding:0 16px;border-radius:100px;background:#fff;color:var(--ink);border:1px solid var(--ink);font-size:13px;font-weight:700;display:none;align-items:center;gap:6px;box-shadow:0 8px 22px -8px rgba(0,0,0,.35)}
.editing #ngFab{display:inline-flex}
#mg{position:fixed;inset:0;z-index:90;background:rgba(23,20,15,.42);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;padding:4vh 16px}
#mg.on{display:flex}
.mg-bx{background:#fff;border-radius:16px;max-width:720px;width:100%;max-height:92vh;box-shadow:0 30px 80px -20px rgba(0,0,0,.5);overflow:hidden;display:flex;flex-direction:column}
.mg-head{flex:none;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px 18px;border-bottom:1px solid var(--line)}
.mg-head b{font-size:15px;font-weight:800;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mg-x{flex:none;width:32px;height:32px;border-radius:50%;border:1px solid var(--line2);background:#fff;font-size:15px}
.mg-body{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.mg-name{flex:none;margin:14px 18px 0;font-size:14px;font-weight:700;padding:9px 12px;border:1px solid var(--line2);border-radius:8px;width:calc(100% - 36px)}
.mg-sec{padding:14px 18px;border-bottom:1px solid var(--line)}
.mg-sec:last-child{border-bottom:0}
.mg-lbl{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-weight:600;margin-bottom:10px}
.mg-lbl small{text-transform:none;letter-spacing:0;color:var(--faint);font-weight:400;margin-left:6px}
.mg-cats{display:flex;gap:6px;margin-bottom:12px}
.mg-cats button{font-size:12px;border:1px solid var(--line2);background:#fff;color:var(--ink2);padding:5px 12px;border-radius:100px;font-weight:600}
.mg-cats button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.mg-grid{display:flex;flex-wrap:wrap;gap:8px}
.mg-tile{position:relative;width:66px;border-radius:8px;overflow:hidden;border:1px solid var(--line2);cursor:pointer;background:#eceae5}
.mg-tile img{display:block;width:66px;height:66px;object-fit:cover}
.mg-tile .ph{width:66px;height:66px;display:grid;place-items:center;color:var(--faint);font-size:18px}
.mg-tile .lab{display:block;font-family:var(--mono);font-size:8px;text-align:center;padding:2px;color:var(--ink2);background:#fff;border-top:1px solid var(--line)}
.mg-tile.off{opacity:.32}
.mg-tile .chk{position:absolute;top:3px;right:3px;width:16px;height:16px;border-radius:50%;background:var(--accent);color:#fff;font-size:10px;display:grid;place-items:center;line-height:1}
.mg-tile.off .chk{background:var(--faint)}
.mg-search{width:100%;font-size:13px;padding:9px 12px;border:1px solid var(--line2);border-radius:8px;margin-bottom:10px;position:sticky;top:-14px;background:#fff;z-index:2}
.mg-cat{min-height:34vh;display:flex;flex-direction:column;gap:6px}
.mg-hint{font-size:12px;color:var(--ink2);line-height:1.5;background:var(--paper);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.mg-row{border:1px solid var(--line);border-radius:9px;overflow:hidden}
.mg-rowh{display:flex;align-items:center;gap:10px;padding:9px 11px;cursor:pointer}
.mg-rowh .nm{flex:1;min-width:0;font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mg-rowh .meta{font-family:var(--mono);font-size:10px;color:var(--faint);white-space:nowrap;flex:none}
.mg-rowh .go{font-size:11px;font-weight:700;color:#fff;background:var(--accent);border:0;border-radius:100px;padding:5px 11px;white-space:nowrap;flex:none}
.mg-rowh .go.added{background:var(--faint)}
.mg-assets{display:none;flex-wrap:wrap;gap:6px;padding:0 11px 11px}
.mg-row.open .mg-assets{display:flex}
.mg-del{font-size:12px;color:#c0392b;border:1px solid #e6b0aa;background:#fff;border-radius:100px;padding:6px 13px;font-weight:600}
@media(max-width:560px){#mg{padding:0}.mg-bx{max-height:100vh;border-radius:0}.mg-tile,.mg-tile img,.mg-tile .ph{width:56px}.mg-tile img,.mg-tile .ph{height:56px}}

/* edit */
#editFab{position:fixed;right:22px;bottom:22px;z-index:70;width:52px;height:52px;border-radius:50%;background:var(--ink);color:#fff;border:0;font-size:20px;display:grid;place-items:center;box-shadow:0 12px 30px -8px rgba(0,0,0,.4);transition:.25s}
#editFab:hover{transform:translateY(-2px)}
#editFab.on{background:var(--accent)}
.editing [data-k]{outline:1px dashed var(--accent);outline-offset:2px;border-radius:3px;cursor:text}
.editing [data-k]:focus{outline:2px solid var(--accent);background:#fff7f0}
#editHint{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:70;background:var(--ink);color:#fff;font-size:13px;padding:11px 18px;border-radius:100px;display:none;align-items:center;gap:10px;box-shadow:0 12px 30px -10px rgba(0,0,0,.4)}
#editHint.on{display:flex}
</style>
</head>
<body>
<header class="top"><div class="in">
  <a href="#resume" class="brand"><i></i><span data-k="ui.brand">김한결</span></a>
  <nav class="menu"><a href="#resume" data-k="ui.navAbout">About</a><a href="#best" data-k="ui.navWork">Work</a><a href="mailto:hansy@daangn.com" class="cta" data-k="ui.navCta">Contact</a></nav>
</div></header>
<main id="main"></main>

<div id="lb"><button class="x" id="lbx">✕</button><div class="bx">
  <div class="lb-media"><div class="lb-stage"><video id="lbv" controls playsinline></video><img id="lbi" alt="" style="display:none"/></div><div class="lb-thumbs" id="lbThumbs"></div></div>
  <div class="lb-info"><h3 id="lbt"></h3><div class="ro" id="lbr"></div><div class="de" id="lbd"></div><div class="kv" id="lbKv"></div><div class="perf" id="lbPerf" style="display:none"></div></div>
</div></div>

<button id="ngFab">＋ 새 그룹</button>
<button id="editFab" title="편집">✎</button>
<div id="editHint"><span>편집 모드 · 카드를 누르면 소재를 관리할 수 있어요 · ✎ 다시 누르면 저장</span></div>

<div id="mg"><div class="mg-bx">
  <div class="mg-head"><b id="mgTitle">소재 관리</b><button class="mg-x" id="mgX">✕</button></div>
  <input class="mg-name" id="mgName" placeholder="그룹 이름" style="display:none"/>
  <div class="mg-body">
    <div class="mg-sec" id="mgCurSec"><div class="mg-lbl">현재 소재 <small>클릭해서 숨김 / 표시</small></div><div class="mg-cats" id="mgCats" style="display:none"></div><div class="mg-grid" id="mgCur"></div><button class="mg-del" id="mgDel" style="display:none;margin-top:14px">이 그룹 삭제</button></div>

      <div class="mg-hint" id="mgHint" style="display:none"></div>
      <input class="mg-search" id="mgSearch" placeholder="이름 검색 (예: rent, keyword, jobs, raffle)"/>
      <div class="mg-cat" id="mgCat"></div></div>
  </div>
</div></div>

<script>
const A={

/* ---- edits (content.json = single source of truth) ---- */
let EDITS={};
async function loadEdits(){
  try{localStorage.removeItem("pf_edits");}catch(e){}
  try{const r=await fetch("content.json?"+Date.now());if(r.ok)EDITS=await r.json();}catch(e){}
}
function applyEdits(){
  for(const k in EDITS){
    if(k.indexOf("photo.")===0){const f=document.getElementById("photoFrame");if(f&&EDITS[k]!=null)f.style.setProperty("--"+k.slice(6),EDITS[k]);continue;}
    if(k==="r.sk"){const el=document.querySelector("[data-sk]");if(el&&EDITS[k]!=null)el.innerHTML=skillChipsHTML(EDITS[k]);continue;}
    const el=document.querySelector('[data-k="'+k+'"]');if(el&&EDITS[k]!=null)el.textContent=EDITS[k];
  }
  document.querySelectorAll(".brow").forEach(row=>{
    const org=row.querySelector('[data-k$=".org"]'),det=row.querySelector('[data-k$=".det"]');
    const empty=(!org||!org.textContent.trim())&&(!det||!det.textContent.trim());
    row.style.display=empty?"none":"";
  });
}

function setupPhotoAdjust(){
  const f=document.getElementById("photoFrame");if(!f)return;
  const gv=(p,d)=>parseFloat(f.style.getPropertyValue("--"+p))||d;
  let drag=false,sx,sy,bx0,by0;
  f.addEventListener("pointerdown",e=>{if(!editing)return;drag=true;sx=e.clientX;sy=e.clientY;bx0=gv("bx",50);by0=gv("by",18);try{f.setPointerCapture(e.pointerId);}catch(_){}});
  f.addEventListener("pointermove",e=>{if(!drag)return;const dx=e.clientX-sx,dy=e.clientY-sy;f.style.setProperty("--bx",Math.max(-60,Math.min(160,bx0-dx*0.22))+"%");f.style.setProperty("--by",Math.max(-60,Math.min(160,by0-dy*0.22))+"%");});
  const end=()=>drag=false;f.addEventListener("pointerup",end);f.addEventListener("pointercancel",end);
  f.addEventListener("wheel",e=>{if(!editing)return;e.preventDefault();let s=gv("bs",178);s=Math.min(360,Math.max(110,s-e.deltaY*0.09));f.style.setProperty("--bs",s+"%");},{passive:false});
}

  else{const x=getJSON("w."+w.id+".xadd",[]),have=new Set(x.map(a=>a.url).concat(baseGallery(w).map(m=>m.url).filter(Boolean)));
    assets.forEach(a=>{if(!have.has(a.url)){x.push({res:a.res,type:a.type,url:a.url});have.add(a.url);}});setJSON("w."+w.id+".xadd",x);}
  const o=getJSON("w."+w.id+".off",[]),o2=o.filter(k=>!assets.some(a=>a.url===k));if(o2.length!==o.length)setJSON("w."+w.id+".off",o2);}
function pkgAdded(c){if(!mgWork)return false;const keys=new Set(candidateGallery(mgWork).map(m=>m.key));return c.assets.length&&c.assets.every(a=>keys.has(a.url));}
function goLabel(c){return mgMode==="pick"?"새 그룹":(pkgAdded(c)?"✓ 추가됨":"＋ 전체");}
function renderMgCat(q){const wrap=document.getElementById("mgCat"),cat=CATALOG||[],qq=(q||"").trim().toLowerCase();
  const list=(qq?cat.filter(c=>c.base.toLowerCase().includes(qq)||(c.cat||"").includes(qq)):cat).slice(0,60);
  wrap.innerHTML=list.length?list.map(c=>`<div class="mg-row" data-i="${cat.indexOf(c)}"><div class="mg-rowh"><span class="nm">${esc(prettyBase(c.base))}</span><span class="meta">${esc(c.cat)} · ▶${c.nv} ■${c.ni} · ₩${big(c.perf.cost)}</span><span class="go${pkgAdded(c)?" added":""}">${goLabel(c)}</span></div><div class="mg-assets"></div></div>`).join(""):'<span style="font-size:12px;color:var(--faint)">검색 결과가 없어요.</span>';
  wrap.querySelectorAll(".mg-row").forEach(row=>{const c=cat[+row.dataset.i];
    row.querySelector(".mg-rowh").onclick=e=>{
      if(e.target.classList.contains("go")){if(mgMode==="pick")createGroup(c);else{addAssetsToWork(mgWork,c.assets);renderMgCur();renderMgCat(document.getElementById("mgSearch").value);}return;}
      row.classList.toggle("open");const box=row.querySelector(".mg-assets");
      if(row.classList.contains("open")&&!box.dataset.done){box.dataset.done="1";
        box.innerHTML=c.assets.map(a=>mgTile(cdnItem(a),false,"+")).join("");
        box.querySelectorAll(".mg-tile").forEach((t,j)=>t.onclick=ev=>{ev.stopPropagation();
          if(mgMode==="pick"){createGroup(c,[c.assets[j]]);return;}addAssetsToWork(mgWork,[c.assets[j]]);renderMgCur();t.querySelector(".chk").textContent="✓";});}};});}
function createGroup(pkg,onlyAssets){const assets=(onlyAssets||pkg.assets).map(a=>({res:a.res,type:a.type,url:a.url}));
  const id=slug(pkg.base)+"_"+Math.abs(hashStr(pkg.base+assets.length)).toString(36).slice(0,4);
  const w={id,u:true,cat:guessFmt(pkg),title:prettyBase(pkg.base),role:"퍼포먼스 소재",year:"",campaign:pkg.base,desc:"",assets,perf:pkg.perf,pv:computePV(assets)};
  const arr=getJSON("works.add",[]);if(!arr.find(x=>x.id===w.id))arr.push(w);setJSON("works.add",arr);openManage(findWork(id));}
async function openManage(w){mgWork=w;mgMode=w?"manage":"pick";
  const nameEl=document.getElementById("mgName"),hint=document.getElementById("mgHint");
  const wt=w?(EDITS["w."+w.id+".title"]||w.title||""):"";
  document.getElementById("mgTitle").textContent=!w?"새 그룹 만들기":(w.u?"소재 관리":"소재 관리 — "+wt);
  document.getElementById("mgCurSec").style.display=w?"":"none";
  document.getElementById("mgAddLbl").textContent=w?"CreativeReporter에서 소재 추가":"CreativeReporter 패키지 선택";
  if(!w){hint.style.display="";hint.textContent="아래 목록에서 소재 패키지를 고르세요. ‘새 그룹’을 누르면 그 패키지의 모든 사이즈가 담긴 카드가 만들어지고, 이어서 개별 소재를 켜고 끌 수 있어요.";}
  else hint.style.display="none";
  if(w&&w.u){nameEl.style.display="";nameEl.value=wt;
    nameEl.oninput=()=>{const arr=getJSON("works.add",[]),e=arr.find(x=>x.id===w.id);if(e){e.title=nameEl.value;setJSON("works.add",arr);w.title=nameEl.value;}};}
  else nameEl.style.display="none";
  const cats=document.getElementById("mgCats"),del=document.getElementById("mgDel");
  if(w&&w.u){cats.style.display="flex";del.style.display="";
    cats.innerHTML=[["motion","모션그래픽"],["3d","3D"],["ai","AI"]].map(c=>`<button data-c="${c[0]}" class="${w.cat===c[0]?"on":""}">${c[1]}</button>`).join("");
    cats.querySelectorAll("button").forEach(b=>b.onclick=()=>{const arr=getJSON("works.add",[]),e=arr.find(x=>x.id===w.id);if(e){e.cat=b.dataset.c;setJSON("works.add",arr);w.cat=b.dataset.c;}cats.querySelectorAll("button").forEach(x=>x.classList.remove("on"));b.classList.add("on");});
    del.onclick=()=>{if(!confirm("이 그룹을 삭제할까요?"))return;setJSON("works.add",getJSON("works.add",[]).filter(x=>x.id!==w.id));closeManage();};}
  else{cats.style.display="none";del.style.display="none";}
  renderMgCur();
  const searchEl=document.getElementById("mgSearch");searchEl.value="";
  document.getElementById("mgCat").innerHTML='<span style="font-size:12px;color:var(--faint)">불러오는 중…</span>';
  mg.classList.add("on");document.body.style.overflow="hidden";
  const body=mg.querySelector(".mg-body");if(body)body.scrollTop=0;
  await loadCatalog();
  if(!CATALOG||!CATALOG.length){document.getElementById("mgCat").innerHTML='<span style="font-size:12px;color:#c0392b">카탈로그를 불러오지 못했어요. 새로고침 후 다시 시도하세요.</span>';return;}
  renderMgCat("");}
function closeManage(){mg.classList.remove("on");document.body.style.overflow="";mgWork=null;rerender();}
document.getElementById("mgX").onclick=closeManage;
mg.onclick=e=>{if(e.target===mg)closeManage();};
document.getElementById("mgSearch").addEventListener("input",e=>renderMgCat(e.target.value));
document.getElementById("ngFab").onclick=()=>openManage(null);

/* ---- edit mode ---- */
let editing=false;
const fab=document.getElementById("editFab");
function skillsToEditMode(){const el=document.querySelector("[data-sk]");if(!el)return;const chips=[...el.querySelectorAll("span")].map(s=>s.textContent.trim()).filter(Boolean);el.textContent=chips.join(", ");el.contentEditable=true;el.classList.add("editing-csv");}
function skillsToViewMode(){const el=document.querySelector("[data-sk]");if(!el)return;const csv=el.textContent.trim();el.contentEditable=false;el.classList.remove("editing-csv");el.innerHTML=skillChipsHTML(csv);}
function rerender(){render();if(editing){document.body.classList.add("editing");document.querySelectorAll("[data-k]").forEach(el=>el.contentEditable=true);skillsToEditMode();}}
fab.onclick=()=>{editing=!editing;document.body.classList.toggle("editing",editing);fab.classList.toggle("on",editing);fab.textContent=editing?"✔":"✎";document.getElementById("editHint").classList.toggle("on",editing);
  document.querySelectorAll("[data-k]").forEach(el=>el.contentEditable=editing);
  if(editing){pauseAllPreviews();skillsToEditMode();}
  else{saveEdits().finally(()=>{skillsToViewMode();resumeVisiblePreviews();});}
};
async function saveEdits(){
  const E={};document.querySelectorAll("[data-k]").forEach(el=>{E[el.dataset.k]=el.textContent.replace(/\s+$/,"");});
  const sk=document.querySelector("[data-sk]");if(sk)E["r.sk"]=sk.textContent.trim();
  const _pf=document.getElementById("photoFrame");if(_pf){["bs","bx","by"].forEach(p=>{const v=_pf.style.getPropertyValue("--"+p);if(v)E["photo."+p]=v.trim();});}
  let pat=localStorage.getItem("pf_pat");
  if(!pat){pat=prompt("GitHub에 저장하려면 토큰을 입력하세요.\n(github.com → Settings → Developer settings → Fine-grained token, 저장소 hansy-daangn/pf 의 Contents: Read and write)\n비워두면 저장되지 않고 변경 내용은 사라집니다.");if(pat)localStorage.setItem("pf_pat",pat);}
  if(!pat){alert("토큰이 없어 저장하지 않았습니다. 새로고침하면 변경 내용은 사라집니다.");return;}
  const NEXT=Object.assign({},EDITS,E);
  try{
    const api="https://api.github.com/repos/hansy-daangn/pf/contents/content.json";
    let sha=null;const g=await fetch(api,{headers:{Authorization:"Bearer "+pat}});if(g.ok)sha=(await g.json()).sha;
    const body={message:"edit: update site text",content:btoa(unescape(encodeURIComponent(JSON.stringify(NEXT,null,1))))};if(sha)body.sha=sha;
    const r=await fetch(api,{method:"PUT",headers:{Authorization:"Bearer "+pat,"Content-Type":"application/json"},body:JSON.stringify(body)});
    if(r.ok){EDITS=NEXT;alert("저장 완료 — GitHub에 반영했습니다. 약 30초 뒤 모든 기기에서 영구 적용됩니다.");}
    else{const e=await r.json().catch(()=>({}));alert("GitHub 저장 실패: "+(e.message||r.status));if(r.status===401||r.status===403)localStorage.removeItem("pf_pat");}
  }catch(e){alert("네트워크 오류 — 저장 실패. "+e.message);}
}
addEventListener("scroll",()=>document.querySelector("header.top").style.boxShadow=scrollY>20?"0 1px 0 var(--line)":"none",{passive:true});
loadEdits().then(render);
</script>
